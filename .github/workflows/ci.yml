name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Compile and test nz-system
        run: |
          cd nz-server
          ./mvnw -q -pl nz-app -am compile -DskipTests
          ./mvnw -q -pl nz-system test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: nz-web/pnpm-lock.yaml
      - name: Install and verify nz-web
        run: |
          cd nz-web
          pnpm install --frozen-lockfile
          pnpm test
          pnpm build
